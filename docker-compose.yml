services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    ports:
      - "${API_PORT:-8000}:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - VITE_API_BASE_URL=http://localhost:${API_PORT:-8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${WEB_PORT:-5173}:5173"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend

volumes:
  backend_data:
